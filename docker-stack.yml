version: "3.9"

services:
  todo-app:
    image: todo-app:latest
    networks:
      - todo-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  priority-service:
    image: priority-service:latest
    networks:
      - todo-network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  stats-service:
    image: stats-service:latest
    networks:
      - todo-network
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - todo-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  todo-network:
    driver: overlay